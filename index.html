    <script>
      // 注册 Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('[PWA] SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('[PWA] SW registration failed:', error);
            });
        });
      }
    </script>
